name: Deploy to EC2 via Docker

on:
  push:
    branches:
      - deployment/aws-helpnearby-co

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/helpnearbyGitHubDeployer
          role-session-name: GitHub-Deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Frontend Docker image
        run: |
          docker build -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/helpnearby/frontend:${{ github.sha }} ./frontend
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/helpnearby/frontend:${{ github.sha }}

      - name: Build and push Backend Docker image
        run: |
          docker build -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/helpnearby/backend:${{ github.sha }} ./backend
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/helpnearby/backend:${{ github.sha }}

      - name: Setup SSH keys
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

       - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          SHA=${{ github.sha }}

          ssh $EC2_USER@$EC2_HOST bash << EOF
            set -e
            AWS_REGION=${AWS_REGION}
            ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
            ECR_PASSWORD=\$(aws ecr get-login-password --region \$AWS_REGION)
            echo "\$ECR_PASSWORD" | docker login --username AWS --password-stdin \$ECR_REGISTRY
            docker pull \$ECR_REGISTRY/helpnearby/frontend:\$SHA
            docker pull \$ECR_REGISTRY/helpnearby/backend:\$SHA
            docker stop helpnearby-frontend 2>/dev/null || true
            docker rm helpnearby-frontend 2>/dev/null || true
            docker stop helpnearby-backend 2>/dev/null || true
            docker rm helpnearby-backend 2>/dev/null || true
            docker run -d --name helpnearby-frontend -p 5000:5000 \$ECR_REGISTRY/helpnearby/frontend:\$SHA
            docker run -d --name helpnearby-backend -p 9000:9000 \$ECR_REGISTRY/helpnearby/backend:\$SHA
          EOF
